<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #E8E2D9; width: 100%; height: 100%; overflow: hidden; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .lean-wrap{background:#E0D9CE;border-radius:8px;padding:24px 28px;min-height:160px;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.75;position:relative;overflow:hidden;border:1px solid #C8BFB0;width:100%}
  .lean-line{display:flex;align-items:center;gap:10px;opacity:0;min-height:22px}
  .lean-line.visible{opacity:1}
  .line-text{color:#7A7268;white-space:pre;transition:color 0.18s,font-weight 0.18s}
  .lean-line.active .line-text{color:#1A1814;font-weight:400}
  .lean-line.verified .line-text{color:#1A1814;font-weight:700}
  .check{opacity:0;color:#4A7A3A;font-size:11px;font-weight:700;transition:opacity 0.15s;flex-shrink:0}
  .lean-line.verified .check{opacity:1}
  .cursor{display:inline-block;width:2px;height:12px;background:#1A1814;margin-left:1px;vertical-align:middle;animation:blink 0.55s steps(1) infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  .flash-overlay{position:absolute;inset:0;border-radius:8px;background:#4A7A3A;opacity:0;pointer-events:none;transition:opacity 0.12s}
  .line-num{color:#C8BFB0;font-size:11px;min-width:18px;text-align:right;user-select:none;flex-shrink:0}
</style>
</head>
<body>
<div class="lean-wrap">
  <div id="lines-container"></div>
  <div class="flash-overlay" id="flash"></div>
</div>
<script>
(function(){
  const LINES=[
    'theorem no_overflow (x y : UInt256) :',
    '  x + y \u2264 MAX_VAL \u2192 valid_state x y := by',
    '  intro h',
    '  apply constraint_check',
    '  exact bound_proof h',
    '  -- \u2713 verified',
  ];
  const CHAR_DELAY=16,VERIFY_DELAY=55,NEXT_LINE_DELAY=80,COMPLETE_PAUSE=650,RESET_PAUSE=350;
  const container=document.getElementById('lines-container');
  const flash=document.getElementById('flash');
  let lineEls=[];
  function build(){
    container.innerHTML='';lineEls=[];
    LINES.forEach((_,i)=>{
      const row=document.createElement('div');row.className='lean-line';
      row.innerHTML=`<span class="line-num">${i+1}</span><span class="line-text"></span><span class="check">\u2713</span>`;
      container.appendChild(row);lineEls.push(row);
    });
  }
  const sleep=ms=>new Promise(r=>setTimeout(r,ms));
  async function type(el,text){
    const span=el.querySelector('.line-text');
    el.classList.add('visible','active');
    for(let i=0;i<=text.length;i++){span.innerHTML=text.slice(0,i)+(i<text.length?'<span class="cursor"></span>':'');await sleep(CHAR_DELAY);}
  }
  async function run(){
    build();await sleep(200);
    for(let i=0;i<LINES.length;i++){await type(lineEls[i],LINES[i]);await sleep(VERIFY_DELAY);lineEls[i].classList.remove('active');lineEls[i].classList.add('verified');await sleep(NEXT_LINE_DELAY);}
    await sleep(100);
    flash.style.opacity='0.07';await sleep(150);flash.style.opacity='0.03';await sleep(120);flash.style.opacity='0';
    await sleep(COMPLETE_PAUSE);
    lineEls.forEach(el=>{el.style.transition='opacity 0.22s';el.style.opacity='0';});
    await sleep(260);await sleep(RESET_PAUSE);run();
  }
  run();
})();
</script>
</body>
</html>
